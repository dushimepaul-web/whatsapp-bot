version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: whatsapp-mongodb
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: whatsapp-bot

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsapp-backend
    restart: unless-stopped
    ports:
      - "9013:3001"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/whatsapp-bot
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET manquant — lance d'abord: backend/scripts/init-env.sh}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET manquant — lance d'abord: backend/scripts/init-env.sh}"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      CONSOLE_ALLOWED_PHONES: ${CONSOLE_ALLOWED_PHONES:-25768863945,25779666439}
    volumes:
      - auth_info:/app/auth_info
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatsapp-frontend
    restart: unless-stopped
    ports:
      - "9016:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  auth_info:
  backend_logs:
